    <!-- Tailwind CDN — required for dynamic classes generated by the editor -->
    <script src="https://cdn.tailwindcss.com/3.4.4"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: {
              xs: "475px",
            },
          },
        },
      };

    <!-- Global responsive base styles -->
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        overflow-x: hidden;
        scroll-behavior: smooth;
      }

      body {
        overflow-x: hidden;
        min-height: 100dvh;
        margin: 0;
        padding: 0;
      }

      #app {
        width: 100%;
        overflow-x: hidden;
      }

      img,
      video,
      iframe,
      embed,
      object {
        max-width: 100%;
        height: auto;
      }

      p, h1, h2, h3, h4, h5, h6, span, a, li, td, th {
        overflow-wrap: break-word;
        word-break: break-word;
      }

      [style*="width"] {
        max-width: 100% !important;
      }

      .responsive-unconstrained {
        max-width: unset !important;
      }
    </style>

    <link rel="manifest" href="/manifest.json" />
